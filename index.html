<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useContext, createContext, useRef, useCallback} = React;

/* ─── CONSTANTS ─── */
const DEFAULT_CONFIG = {
  spaceId:'b4hc9l38hrco',
  deliveryKey:'hH65WQAmS5bzyjeuWLlWvibHU5Xg0Vk8i4LXw2eEeMI',
  prospectUrl:'',brandPrimary:'#0f172a',brandAccent:'#6366f1',
  brandBg:'#f9f7f4',brandText:'#0f172a',brandHeaderText:'#ffffff',
  companyName:'Content Hub',logoUrl:'',
  heroHeadline:'Insights & Resources',
  heroSubheading:'Stay ahead with the latest thinking from our team.',
  heroImageUrl:'',
  fallbackImageUrl:'https://picsum.photos/seed/fallback/800/450',heroImageUrl:'https://picsum.photos/seed/hero/1600/900',
  articles:[],news:[],aboutText:'',products:[],generated:false,theme:'generic',
};

/* ─── CONTEXT ─── */
const HubCtx = createContext(null);
const useHub = () => useContext(HubCtx);

/* ─── UTILS ─── */
function applyBrandVars(c){
  const r = document.documentElement;
  r.style.setProperty('--brand-primary', c.brandPrimary);
  r.style.setProperty('--brand-accent', c.brandAccent);
  r.style.setProperty('--brand-bg', c.brandBg);
  r.style.setProperty('--brand-text', c.brandText);
  r.style.setProperty('--brand-header-text', c.brandHeaderText);
}
function bestTextColor(hex){
  if(!hex||hex.length<4)return'#ffffff';
  const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
  const L=0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255);
  return L>0.35?'#0f172a':'#ffffff';
}
function getContrastLabel(bg,fg){
  if(!bg||!fg||bg.length<4||fg.length<4)return'';
  const lum=(hex)=>{
    const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    return 0.2126*(r<=0.03928?r/12.92:Math.pow((r+0.055)/1.055,2.4))
          +0.7152*(g<=0.03928?g/12.92:Math.pow((g+0.055)/1.055,2.4))
          +0.0722*(b<=0.03928?b/12.92:Math.pow((b+0.055)/1.055,2.4));
  };
  try{
    const l1=lum(bg),l2=lum(fg);
    const ratio=(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
    if(ratio>=7)return'AAA ✓';
    if(ratio>=4.5)return'AA ✓';
    if(ratio>=3)return'AA Large';
    return'Low ⚠';
  }catch{return'';}
}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}
}
function fmtDateLong(d){
  if(!d)return'';
  try{return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch{return d;}
}
/* ─── THEMES ─── */
const THEMES = {
  generic: {
    id:'generic', label:'Generic', emoji:'🌐',
    description:'Warm · rounded · serif headlines',
    overrides: {
      brandBg:'#f9f7f4',
      cardBg:'#ffffff', cardBorder:'#e2e8f0',
      cardRadius:'14px', navRadius:'8px', btnRadius:'10px', badgeRadius:'20px',
      heroFont:'DM Serif Display,serif', headingFont:'DM Serif Display,serif',
      categoryStyle:'pill', sectionBg:'#f0ede8',
      navShadow:'0 2px 16px rgba(0,0,0,0.15)',
    }
  },
  b2btech: {
    id:'b2btech', label:'B2B Tech', emoji:'⚙',
    description:'Dark · monospace · sharp corners · cyan',
    overrides: {
      brandBg:'#080d14', brandText:'#e2e8f0',
      cardBg:'#0a0f1a', cardBorder:'#1e3a5f',
      cardRadius:'4px', navRadius:'2px', btnRadius:'2px', badgeRadius:'2px',
      heroFont:'monospace', headingFont:'monospace',
      categoryStyle:'tag', sectionBg:'#0a0f1a',
      navShadow:'none', navBorderBottom:'1px solid #1e3a5f',
      forceDark:true,
    }
  },
  health: {
    id:'health', label:'Health Sciences', emoji:'🏥',
    description:'White nav · medical green · clean · trusted',
    overrides: {
      brandBg:'#f0f7f4',
      cardBg:'#ffffff', cardBorder:'#d1e9df',
      cardRadius:'12px', navRadius:'8px', btnRadius:'24px', badgeRadius:'24px',
      heroFont:'DM Sans,sans-serif', headingFont:'DM Sans,sans-serif',
      categoryStyle:'pill', sectionBg:'#e8f5ef',
      navBg:'#ffffff', navTextColor:'#0f172a',
      navShadow:'0 1px 8px rgba(0,0,0,0.06)',
    }
  },
  finserv: {
    id:'finserv', label:'Finserv', emoji:'🏦',
    description:'Navy/gold · serif · square corners · formal',
    overrides: {
      brandBg:'#fafaf8',
      cardBg:'#ffffff', cardBorder:'#e8e0d0',
      cardRadius:'0px', navRadius:'0px', btnRadius:'0px', badgeRadius:'0px',
      heroFont:'Georgia,serif', headingFont:'Georgia,serif',
      categoryStyle:'label', sectionBg:'#f5f0e8',
      navShadow:'none', navBorderBottom:'2px solid',
    }
  },
  ecommerce: {
    id:'ecommerce', label:'Ecommerce', emoji:'🛍',
    description:'Energetic · pill badges · warm · playful',
    overrides: {
      brandBg:'#fff5f7',
      cardBg:'#ffffff', cardBorder:'#fce7ec',
      cardRadius:'16px', navRadius:'24px', btnRadius:'24px', badgeRadius:'24px',
      heroFont:'DM Sans,sans-serif', headingFont:'DM Sans,sans-serif',
      categoryStyle:'pill', sectionBg:'#fff0f4',
      navBg:'#ffffff', navTextColor:'#0f172a',
      navShadow:'0 1px 8px rgba(0,0,0,0.08)',
    }
  },
};

// Detect theme from industry hint
function detectTheme(companyName, aboutText) {
  const text = ((companyName||'') + ' ' + (aboutText||'')).toLowerCase();
  if(/health|medical|clinic|pharma|biotech|hospital|care|patient|drug|therapy|science/i.test(text)) return 'health';
  if(/bank|financ|invest|capital|fund|asset|wealth|insurance|payment|fintech|trading|credit/i.test(text)) return 'finserv';
  if(/shop|retail|commerce|store|fashion|brand|consumer|beauty|apparel|marketplace/i.test(text)) return 'ecommerce';
  if(/software|cloud|api|platform|data|enterprise|developer|saas|devops|cyber|security|network|tech/i.test(text)) return 'b2btech';
  return 'generic';
}

function getThemeStyles(themeId, config) {
  const t = THEMES[themeId] || THEMES.generic;
  const o = t.overrides;
  return {
    brandBg: o.forceDark ? o.brandBg : (o.brandBg || config.brandBg || '#f9f7f4'),
    brandText: o.forceDark ? o.brandText : (config.brandText || '#1a1a2e'),
    cardBg: o.cardBg || '#ffffff',
    cardBorder: o.cardBorder || '#e2e8f0',
    cardRadius: o.cardRadius || '14px',
    navRadius: o.navRadius || '8px',
    btnRadius: o.btnRadius || '10px',
    badgeRadius: o.badgeRadius || '20px',
    heroFont: o.heroFont || 'DM Serif Display,serif',
    headingFont: o.headingFont || 'DM Serif Display,serif',
    categoryStyle: o.categoryStyle || 'pill',
    sectionBg: o.sectionBg || '#f0ede8',
    navBg: o.navBg || config.brandPrimary,
    navTextColor: o.navTextColor || config.brandHeaderText,
    navShadow: o.navShadow !== undefined ? o.navShadow : '0 2px 16px rgba(0,0,0,0.15)',
    navBorderBottom: o.navBorderBottom || 'none',
    forceDark: o.forceDark || false,
  };
}

function slugify(s){return(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}


async function scrapeBrand(url, manual=false){
  const clean=url?(url.startsWith('http')?url:'https://'+url):'';
  const res=await fetch('/.netlify/functions/claude-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({url:clean, manual})
  });
  if(!res.ok){const e=await res.text();throw new Error('Proxy '+res.status+': '+e);}
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  return data;
}

/* ─── ROUTER (hash-based, no library) ─── */
function useRoute(){
  const [route,setRoute]=useState(()=>window.location.hash.slice(1)||'/setup');
  useEffect(()=>{
    const handler=()=>setRoute(window.location.hash.slice(1)||'/setup');
    window.addEventListener('hashchange',handler);
    return()=>window.removeEventListener('hashchange',handler);
  },[]);
  return route;
}
function navigate(path){window.location.hash=path;}

/* ─── ROOT APP ─── */
function App(){
  const [config,setConfig]=useState(()=>{
    try{const s=localStorage.getItem('hub_config');return s?{...DEFAULT_CONFIG,...JSON.parse(s)}:DEFAULT_CONFIG;}
    catch{return DEFAULT_CONFIG;}
  });
  const [contentfulItems,setContentfulItems]=useState([]);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [refreshing,setRefreshing]=useState(false);
  const route=useRoute();

  const updateConfig=useCallback((updates)=>{
    setConfig(prev=>{
      const next={...prev,...updates};
      localStorage.setItem('hub_config',JSON.stringify(next));
      applyBrandVars(next);
      return next;
    });
  },[]);

  useEffect(()=>{applyBrandVars(config);},[]);

  // Contentful polling — 15 min recency filter
  const pollContentful=useCallback(async(manual=false)=>{
    if(!config.generated)return;
    if(manual)setRefreshing(true);
    try{
      const res=await fetch(`https://cdn.contentful.com/spaces/${config.spaceId}/entries?access_token=${config.deliveryKey}&content_type=landingPage&order=-sys.createdAt&limit=10`);
      if(!res.ok)return;
      const data=await res.json();
      const fifteenMinsAgo=new Date(Date.now()-15*60*1000);
      const items=(data.items||[])
        .filter(item=>new Date(item.sys.createdAt)>fifteenMinsAgo)
        .map(item=>{
          const f=item.fields;
          let imageUrl=`https://picsum.photos/seed/cf-${item.sys.id}/800/450`;
          if(f.featuredImage&&data.includes){
            const asset=data.includes.Asset?.find(a=>a.sys.id===f.featuredImage.sys.id);
            if(asset?.fields?.file?.url)imageUrl='https:'+asset.fields.file.url;
          }
          return{
            id:item.sys.id,
            title:f.title||f.name||f.headline||'Untitled',
            slug:f.slug||f.pageSlug||item.sys.id,
            body:f.body||f.content||f.pageContent||f.copy||'',
            summary:(()=>{
              const raw=f.summary||f.description||f.subtitle||f.excerpt||f.metaDescription||f.body||f.content||f.pageContent||f.copy||'';
              const stripped=raw.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();
              return stripped.length>160?stripped.slice(0,157)+'…':stripped;
            })(),
            imageUrl,publishedAt:item.sys.createdAt,isNew:true,source:'contentful',
            category:f.category||f.contentType||f.type||'Latest',
            readTime:'5 min read',date:item.sys.createdAt,
          };
        });
      setContentfulItems(items);
      setLastRefresh(new Date());
    }catch(e){}
    finally{if(manual)setRefreshing(false);}
  },[config.generated,config.spaceId,config.deliveryKey]);

  useEffect(()=>{
    if(!config.generated)return;
    pollContentful();
    const iv=setInterval(()=>pollContentful(),30000);
    return()=>clearInterval(iv);
  },[config.generated,config.spaceId,config.deliveryKey]);

  // Route guard
  const needsSetup=!config.generated;
  const isSetupRoute=route==='/setup'||route==='/validate';
  useEffect(()=>{
    if(needsSetup&&!isSetupRoute)navigate('/setup');
  },[needsSetup,isSetupRoute]);

  const ctx={config,updateConfig,contentfulItems,DEFAULT_CONFIG,pollContentful,refreshing,lastRefresh,THEMES,detectTheme,getThemeStyles};

  return(
    <HubCtx.Provider value={ctx}>
      {route==='/setup'&&<SetupPage/>}
      {route==='/validate'&&<ValidatePage/>}
      {config.generated&&route==='/demo'&&<DemoHub/>}
      {config.generated&&route==='/demo/articles'&&<ArticlesPage/>}
      {config.generated&&route.startsWith('/demo/articles/')&&<ArticleDetail slug={route.replace('/demo/articles/','')}/>}
      {config.generated&&route==='/demo/news'&&<NewsPage/>}
      {config.generated&&route.startsWith('/demo/news/')&&<NewsDetail slug={route.replace('/demo/news/','')}/>}
      {config.generated&&route==='/demo/products'&&<ProductsPage/>}
      {config.generated&&route==='/demo/about'&&<AboutPage/>}
    </HubCtx.Provider>
  );
}

/* ─── SETUP PAGE ─── */
function SetupPage(){
  const {config,updateConfig,DEFAULT_CONFIG}=useHub();
  const [url,setUrl]=useState(config.prospectUrl||'');
  const [spaceId,setSpaceId]=useState(config.spaceId||DEFAULT_CONFIG.spaceId);
  const [deliveryKey,setDeliveryKey]=useState(config.deliveryKey||DEFAULT_CONFIG.deliveryKey);
  const [loading,setLoading]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState('');
  const [error,setError]=useState('');
  const [showManual,setShowManual]=useState(false);
  const [manual,setManual]=useState({brandPrimary:'#0f172a',brandAccent:'#6366f1',brandBg:'#f9f7f4',brandText:'#0f172a'});

  const steps=['Crawling site with Firecrawl…','Extracting real articles…','Analyzing brand identity…','Structuring content…','Building your hub…','Almost there…'];

  const handleAnalyze=async()=>{
    if(!url.trim()){setError('Please enter a prospect URL');return;}
    setError('');setLoading(true);
    let i=0;setLoadingMsg(steps[0]);
    const iv=setInterval(()=>{i=(i+1)%steps.length;setLoadingMsg(steps[i]);},2200);
    try{
      const brand=await scrapeBrand(url.trim());
      clearInterval(iv);
      const autoTheme=detectTheme(brand.companyName, brand.aboutText);
      // Wipe old config first so nothing bleeds through from previous analysis
      localStorage.removeItem('hub_config');
      updateConfig({...DEFAULT_CONFIG,prospectUrl:url.trim(),spaceId,deliveryKey,...brand,theme:autoTheme,generated:false});
      navigate('/validate');
    }catch(e){
      clearInterval(iv);
      setError('Error: ' + (e.message||String(e)));
      setLoading(false);
    }
  };

  const handleManual=async()=>{
    // Path A: Jasper-generated content with manual colors
    setError('');setLoading(true);
    let i=0;setLoadingMsg('Generating content with Jasper…');
    const iv=setInterval(()=>{
      const msgs=['Generating articles with Jasper…','Writing news items…','Building your hub…'];
      i=(i+1)%msgs.length;setLoadingMsg(msgs[i]);
    },2500);
    try{
      const companyName=url.trim()?url.trim().replace(/https?:\/\//,'').split('/')[0]:'Content Hub';
      const brand=await scrapeBrand(companyName, true);
      clearInterval(iv);
      updateConfig({prospectUrl:'',spaceId,deliveryKey,...manual,
        brandHeaderText:bestTextColor(manual.brandPrimary),
        companyName,
        articles: brand.articles||[],
        news: brand.news||[],
        aboutText: brand.aboutText||'',
        products: brand.products||[],
      });
      navigate('/validate');
    }catch(e){
      clearInterval(iv);
      setError('Jasper error: '+(e.message||String(e)));
      setLoading(false);
    }
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#f8fafc 0%,#eef2ff 100%)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'60px 16px 40px',fontFamily:'DM Sans,sans-serif'}}>
      <div style={{width:'100%',maxWidth:560}}>
        {/* Logo badge */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:32}}>
          <div style={{display:'flex',alignItems:'center',gap:10,background:'white',border:'1px solid #e2e8f0',borderRadius:100,padding:'8px 16px 8px 10px',fontSize:14,fontWeight:600,color:'#0f172a',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
            <JasperIcon size={28}/>
            Jasper Demo Hub Builder
          </div>
        </div>

        <div style={{background:'white',borderRadius:20,padding:'36px 40px',boxShadow:'0 4px 32px rgba(0,0,0,0.08)',border:'1px solid #e2e8f0'}}>
          <h1 style={{fontSize:26,fontWeight:600,color:'#0f172a',marginBottom:8,letterSpacing:'-0.3px'}}>Build a branded content hub</h1>
          <p style={{fontSize:15,color:'#64748b',lineHeight:1.6,marginBottom:28}}>Enter your prospect's URL — we'll extract their brand identity and generate a live demo hub styled to match.</p>

          {/* URL */}
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:500,color:'#374151',marginBottom:6}}>Prospect / Customer URL</label>
            <div style={{display:'flex',alignItems:'center',border:'1.5px solid',borderColor:'#e2e8f0',borderRadius:10,overflow:'hidden',background:'#fff'}}>
              <span style={{padding:'0 10px',fontSize:14,color:'#94a3b8',background:'#f8fafc',borderRight:'1.5px solid #e2e8f0',height:44,display:'flex',alignItems:'center'}}>https://</span>
              <input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAnalyze()}
                placeholder="jasper.ai" disabled={loading}
                style={{flex:1,border:'none',outline:'none',padding:'0 14px',fontSize:15,fontFamily:'DM Sans,sans-serif',color:'#0f172a',height:44,background:'transparent'}}/>
            </div>
          </div>





          {error&&<div style={{display:'flex',alignItems:'center',gap:6,background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',borderRadius:8,padding:'10px 14px',fontSize:13,marginBottom:16}}>⚠ {error}</div>}

          {!loading
            ?<button onClick={handleAnalyze} disabled={showManual}
              style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'#FF4F00',color:'white',border:'none',borderRadius:12,padding:'14px 24px',fontSize:15,fontWeight:600,cursor:'pointer',transition:'background 0.2s',opacity:showManual?0.5:1}}
              onMouseOver={e=>e.currentTarget.style.background='#e04500'} onMouseOut={e=>e.currentTarget.style.background='#FF4F00'}>
              ✦ Analyze Site &amp; Build Hub
            </button>
            :<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:14,background:'#fff7f5',border:'1.5px solid #fed7c3',borderRadius:12}}>
              <div style={{width:20,height:20,border:'2px solid #fed7c3',borderTopColor:'#FF4F00',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}></div>
              <span style={{fontSize:14,color:'#FF4F00',fontWeight:500}}>{loadingMsg}</span>
            </div>
          }

          <div style={{display:'flex',alignItems:'center',gap:12,margin:'20px 0 12px',color:'#94a3b8',fontSize:13}}>
            <div style={{flex:1,height:1,background:'#e2e8f0'}}></div>or set up manually<div style={{flex:1,height:1,background:'#e2e8f0'}}></div>
          </div>

          <button onClick={()=>setShowManual(v=>!v)} disabled={loading}
            style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:'transparent',border:'1.5px dashed #cbd5e1',color:'#64748b',borderRadius:10,padding:10,fontSize:14,fontFamily:'DM Sans,sans-serif',cursor:'pointer',transition:'all 0.2s'}}
            onMouseOver={e=>{e.currentTarget.style.borderColor='#6366f1';e.currentTarget.style.color='#6366f1';}}
            onMouseOut={e=>{e.currentTarget.style.borderColor='#cbd5e1';e.currentTarget.style.color='#64748b';}}>
            ⚙ {showManual?'Hide manual setup':'Choose colors manually'}
          </button>

          {showManual&&(
            <div style={{marginTop:16,padding:20,background:'#f8fafc',borderRadius:12,border:'1px solid #e2e8f0',animation:'fadeIn 0.2s ease'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                {[['Header / Nav','brandPrimary'],['Accent / CTA','brandAccent'],['Page background','brandBg'],['Body text','brandText']].map(([label,key])=>(
                  <div key={key}>
                    <label style={{fontSize:12,fontWeight:500,color:'#374151',marginBottom:5,display:'block'}}>{label}</label>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <input type="color" value={manual[key]} onChange={e=>setManual(p=>({...p,[key]:e.target.value}))}
                        style={{width:36,height:36,borderRadius:8,border:'1.5px solid #e2e8f0',cursor:'pointer',padding:2}}/>
                      <input type="text" value={manual[key]} maxLength={7} onChange={e=>setManual(p=>({...p,[key]:e.target.value}))}
                        style={{flex:1,border:'1.5px solid #e2e8f0',borderRadius:8,padding:'0 10px',fontSize:12,fontFamily:'monospace',height:36,outline:'none',color:'#374151'}}/>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={handleManual}
                style={{width:'100%',background:'#FF4F00',color:'white',border:'none',borderRadius:10,padding:'12px',fontSize:14,fontWeight:600,cursor:'pointer'}}>
                Continue with manual setup →
              </button>
            </div>
          )}
        </div>

    `Our mission is to make it easier for organizations to create, manage, and distribute content that resonates — at the speed the market demands.`,
    `We work with hundreds of teams across industries, from fast-growing startups to global enterprises. Every product decision we make is grounded in the real challenges our customers face daily.`,
  ];
  const stats=[{v:'500+',l:'Customers worldwide'},{v:'10M+',l:'Content pieces created'},{v:'99.9%',l:'Platform uptime'},{v:'4.8★',l:'Average review score'}];
  return(
    <HubLayout>
      <div style={{background:config.brandPrimary,padding:'48px 0 40px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 32px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,marginBottom:12}}>
            <a href="#/demo" style={{color:'rgba(255,255,255,0.6)',textDecoration:'none'}}>Home</a><span style={{color:'rgba(255,255,255,0.4)'}}>›</span><span style={{color:'white'}}>About</span>
          </div>
          <h1 style={{fontFamily:'DM Serif Display,serif',fontSize:44,color:'white'}}>About {config.companyName}</h1>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'48px 32px 80px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:48,marginBottom:48,alignItems:'start'}}>
          <div>{paras.map((p,i)=><p key={i} style={{fontSize:17,lineHeight:1.8,color:'#374151',marginBottom:22}}>{p}</p>)}</div>
          <div style={{background:config.brandPrimary,borderRadius:16,padding:28,display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
            {stats.map(s=>(
              <div key={s.l}>
                <div style={{fontSize:28,fontWeight:700,color:'white',fontFamily:'DM Serif Display,serif',marginBottom:4}}>{s.v}</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,0.6)'}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:24,background:'#fff7f5',border:'1.5px solid #ffd4c2',borderRadius:16,padding:'24px 28px',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:16,flex:1}}>
            <JasperIcon size={36}/>
            <div>
              <div style={{fontSize:16,fontWeight:600,color:'#0f172a',marginBottom:4}}>This hub is powered by Jasper AI</div>
              <div style={{fontSize:14,color:'#64748b',lineHeight:1.5}}>Content published here flows from Jasper directly into Contentful and onto this page — in real time.</div>
            </div>
          </div>
          <a href="https://jasper.ai" target="_blank" rel="noreferrer"
            style={{background:'#FF4F00',color:'white',padding:'11px 20px',borderRadius:10,fontSize:14,fontWeight:600,textDecoration:'none',whiteSpace:'nowrap'}}>
            See how it works →
          </a>
        </div>
      </div>
    </HubLayout>
  );
}

/* ─── JASPER ICON ─── */
function JasperIcon({size=32}){
  return(
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="#FF4F00"/>
      <path d="M10 22L16 10L22 22" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M12.5 18H19.5" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

/* ─── MOUNT ─── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
