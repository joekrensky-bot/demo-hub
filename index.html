function parseMarkdown(raw) {
  if (!raw || typeof raw !== 'string') return raw || '';
  // If it already looks like HTML (has real tags), just clean up leftover markdown symbols lightly
  const hasHtml = /<(p|h[1-6]|ul|ol|li|blockquote|strong|em|div|br)[^>]*>/i.test(raw);
  const lines = raw.split('\n');
  const out = [];
  let listOpen = false;
  const closeList = () => {
    if (listOpen) {
      out.push('</ul>');
      listOpen = false;
    }
  };
  const inlineFormat = s => s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/`(.+?)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:0.9em;">$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">$1</a>');
  if (hasHtml) {
    // Already HTML — just strip stray leading # symbols from paragraph text
    return raw.replace(/<p[^>]*>#{1,6}\s*/g, '<p>').replace(/^#{1,6}\s+/gm, '');
  }
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) {
      closeList();
      out.push('');
      continue;
    }
    if (/^---+$/.test(trimmed)) {
      closeList();
      out.push('<hr style="border:none;border-top:1px solid #e2e8f0;margin:28px 0;">');
      continue;
    }

    // Headings
    const h3 = trimmed.match(/^###\s+(.+)/);
    const h2 = trimmed.match(/^##\s+(.+)/);
    const h1 = trimmed.match(/^#\s+(.+)/);
    if (h3) {
      closeList();
      out.push('<h3 style="font-size:18px;font-weight:600;margin:28px 0 10px;line-height:1.3;">' + inlineFormat(h3[1]) + '</h3>');
      continue;
    }
    if (h2) {
      closeList();
      out.push('<h2>' + inlineFormat(h2[1]) + '</h2>');
      continue;
    }
    if (h1) {
      closeList();
      out.push('<h2>' + inlineFormat(h1[1]) + '</h2>');
      continue;
    }

    // Blockquote
    const bq = trimmed.match(/^>\s*(.*)/);
    if (bq) {
      closeList();
      out.push('<blockquote><p>' + inlineFormat(bq[1]) + '</p></blockquote>');
      continue;
    }

    // Unordered list
    const li = trimmed.match(/^[-*]\s+(.+)/);
    if (li) {
      if (!listOpen) {
        out.push('<ul style="margin:16px 0 16px 20px;display:flex;flex-direction:column;gap:6px;">');
        listOpen = true;
      }
      out.push('<li style="line-height:1.6;">' + inlineFormat(li[1]) + '</li>');
      continue;
    }

    // Numbered list
    const oli = trimmed.match(/^\d+\.\s+(.+)/);
    if (oli) {
      if (!listOpen) {
        out.push('<ol style="margin:16px 0 16px 20px;display:flex;flex-direction:column;gap:6px;">');
        listOpen = true;
      }
      out.push('<li style="line-height:1.6;">' + inlineFormat(oli[1]) + '</li>');
      continue;
    }
    closeList();
    out.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList();

  // Collapse multiple empty lines, merge consecutive <p> runs into single paragraphs
  return out.filter((l, i, a) => !(l === '' && a[i - 1] === '')).join('\n').replace(/<\/p>\n<p>/g, '</p><p>');
}

function getItemImage(slug, category, index, theme) {
  // Resolve theme → curated bank
  const bank = CURATED_IMAGES[theme] || CURATED_IMAGES.generic;

  const pool = isNews ? bank.news : bank.articles;
  return pool[index % pool.length];
}

/* ─── STRIP MARKDOWN for card previews ─── */
function stripMd(s) {
  if (!s) return '';
  return String(s).replace(/^#{1,6}\s+/gm, '') // remove # headings
  .replace(/\*\*\*(.+?)\*\*\*/g, '$1') // bold+italic
  .replace(/\*\*(.+?)\*\*/g, '$1') // bold
  .replace(/\*(.+?)\*/g, '$1') // italic
  .replace(/`(.+?)`/g, '$1') // inline code
  .replace(/^[-*]\s+/gm, '') // list bullets
  .replace(/^\d+\.\s+/gm, '') // numbered lists
  .replace(/^>\s*/gm, '') // blockquotes
  .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // links
  .replace(/<[^>]*>/g, '') // any html tags
  .replace(/\n+/g, ' ') // collapse newlines
  .trim();
}
function applyBrandVars(c) {
  const r = document.documentElement;
  r.style.setProperty('--brand-primary', c.brandPrimary);
  r.style.setProperty('--brand-accent', c.brandAccent);
  r.style.setProperty('--brand-bg', c.brandBg);
  r.style.setProperty('--brand-text', c.brandText);
  r.style.setProperty('--brand-header-text', c.brandHeaderText);
}
function bestTextColor(hex) {
  if (!hex || hex.length < 4) return '#ffffff';
  const r = parseInt(hex.slice(1, 3), 16) || 0,
    g = parseInt(hex.slice(3, 5), 16) || 0,
    b = parseInt(hex.slice(5, 7), 16) || 0;
  const L = 0.2126 * (r / 255) + 0.7152 * (g / 255) + 0.0722 * (b / 255);
  return L > 0.35 ? '#0f172a' : '#ffffff';
}
function getContrastLabel(bg, fg) {
  if (!bg || !fg || bg.length < 4 || fg.length < 4) return '';
  const lum = hex => {
    const r = parseInt(hex.slice(1, 3), 16) / 255,
      g = parseInt(hex.slice(3, 5), 16) / 255,
      b = parseInt(hex.slice(5, 7), 16) / 255;
    return 0.2126 * (r <= 0.03928 ? r / 12.92 : Math.pow((r + 0.055) / 1.055, 2.4)) + 0.7152 * (g <= 0.03928 ? g / 12.92 : Math.pow((g + 0.055) / 1.055, 2.4)) + 0.0722 * (b <= 0.03928 ? b / 12.92 : Math.pow((b + 0.055) / 1.055, 2.4));
  };
  try {
    const l1 = lum(bg),
      l2 = lum(fg);
    const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
    if (ratio >= 7) return 'AAA ✓';
    if (ratio >= 4.5) return 'AA ✓';
    if (ratio >= 3) return 'AA Large';
    return 'Low ⚠';
  } catch {
    return '';
  }
}
function fmtDate(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('en-US', {
      month: 'short',
      day: 'numeric',
      year: 'numeric'
    });
  } catch {
    return d;
  }
}
function fmtDateLong(d) {
  if (!d) return '';

    return new Date(d).toLocaleDateString('en-US', {
      month: 'long',
      day: 'numeric',
      year: 'numeric'
    });
  } catch {
    return d;
  }
}
