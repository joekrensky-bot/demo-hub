function parseMarkdown(raw){
  if(!raw||typeof raw!=='string')return raw||'';
  // If it already looks like HTML (has real tags), just clean up leftover markdown symbols lightly
  const hasHtml=/<(p|h[1-6]|ul|ol|li|blockquote|strong|em|div|br)[^>]*>/i.test(raw);

  const lines=raw.split('\n');
  const out=[];
  let listOpen=false;

  const closeList=()=>{if(listOpen){out.push('</ul>');listOpen=false;}};
  const inlineFormat=s=>s
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:0.9em;">$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">$1</a>');

  if(hasHtml){
    // Already HTML — just strip stray leading # symbols from paragraph text
    return raw
      .replace(/<p[^>]*>#{1,6}\s*/g,'<p>')
      .replace(/^#{1,6}\s+/gm,'');
  }

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const trimmed=line.trim();

    if(!trimmed){closeList();out.push('');continue;}
    if(/^---+$/.test(trimmed)){closeList();out.push('<hr style="border:none;border-top:1px solid #e2e8f0;margin:28px 0;">');continue;}

    // Headings
    const h3=trimmed.match(/^###\s+(.+)/);
    const h2=trimmed.match(/^##\s+(.+)/);
    const h1=trimmed.match(/^#\s+(.+)/);
    if(h3){closeList();out.push('<h3 style="font-size:18px;font-weight:600;margin:28px 0 10px;line-height:1.3;">'+inlineFormat(h3[1])+'</h3>');continue;}
    if(h2){closeList();out.push('<h2>'+inlineFormat(h2[1])+'</h2>');continue;}
    if(h1){closeList();out.push('<h2>'+inlineFormat(h1[1])+'</h2>');continue;}

    // Blockquote
    const bq=trimmed.match(/^>\s*(.*)/);
    if(bq){closeList();out.push('<blockquote><p>'+inlineFormat(bq[1])+'</p></blockquote>');continue;}

    // Unordered list
    const li=trimmed.match(/^[-*]\s+(.+)/);
    if(li){
      if(!listOpen){out.push('<ul style="margin:16px 0 16px 20px;display:flex;flex-direction:column;gap:6px;">');listOpen=true;}
      out.push('<li style="line-height:1.6;">'+inlineFormat(li[1])+'</li>');
      continue;
    }

    // Numbered list
    const oli=trimmed.match(/^\d+\.\s+(.+)/);
    if(oli){
      if(!listOpen){out.push('<ol style="margin:16px 0 16px 20px;display:flex;flex-direction:column;gap:6px;">');listOpen=true;}
      out.push('<li style="line-height:1.6;">'+inlineFormat(oli[1])+'</li>');
      continue;
    }

    closeList();
    out.push('<p>'+inlineFormat(trimmed)+'</p>');
  }
  closeList();

  // Collapse multiple empty lines, merge consecutive <p> runs into single paragraphs
  return out
    .filter((l,i,a)=>!(l===''&&a[i-1]===''))
    .join('\n')
    .replace(/<\/p>\n<p>/g,'</p><p>');
}

function getItemImage(slug, category, index, theme){
  // Resolve theme → curated bank
  const bank = CURATED_IMAGES[theme] || CURATED_IMAGES.generic;
  const isNews = category === 'News' || category === 'Latest';
  const pool = isNews ? bank.news : bank.articles;
  return pool[index % pool.length];
}

/* ─── STRIP MARKDOWN for card previews ─── */
function stripMd(s){
  if(!s)return'';
  return String(s)
    .replace(/^#{1,6}\s+/gm,'')       // remove # headings
    .replace(/\*\*\*(.+?)\*\*\*/g,'$1') // bold+italic
    .replace(/\*\*(.+?)\*\*/g,'$1')   // bold
    .replace(/\*(.+?)\*/g,'$1')        // italic
    .replace(/`(.+?)`/g,'$1')          // inline code
    .replace(/^[-*]\s+/gm,'')          // list bullets
    .replace(/^\d+\.\s+/gm,'')         // numbered lists
    .replace(/^>\s*/gm,'')             // blockquotes
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1') // links
    .replace(/<[^>]*>/g,'')            // any html tags
    .replace(/\n+/g,' ')              // collapse newlines
    .trim();
}

function bestTextColor(hex){
  if(!hex||hex.length<4)return'#ffffff';
  const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
  const L=0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255);
  return L>0.35?'#0f172a':'#ffffff';
}
function getContrastLabel(bg,fg){
  if(!bg||!fg||bg.length<4||fg.length<4)return'';
  const lum=(hex)=>{
    const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    return 0.2126*(r<=0.03928?r/12.92:Math.pow((r+0.055)/1.055,2.4))
          +0.7152*(g<=0.03928?g/12.92:Math.pow((g+0.055)/1.055,2.4))
          +0.0722*(b<=0.03928?b/12.92:Math.pow((b+0.055)/1.055,2.4));
  };
  try{
    const l1=lum(bg),l2=lum(fg);
    const ratio=(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
    if(ratio>=7)return'AAA ✓';
    if(ratio>=4.5)return'AA ✓';
    if(ratio>=3)return'AA Large';
    return'Low ⚠';
  }catch{return'';}
}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}
}
function fmtDateLong(d){
  if(!d)return'';
  try{return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch{return d;}
}

// Detect theme from industry hint
function detectTheme(companyName, aboutText) {
  const text = ((companyName||'') + ' ' + (aboutText||'')).toLowerCase();
  if(/health|medical|clinic|pharma|biotech|hospital|care|patient|drug|therapy|science/i.test(text)) return 'health';
  if(/bank|financ|invest|capital|fund|asset|wealth|insurance|payment|fintech|trading|credit/i.test(text)) return 'finserv';
  if(/shop|retail|commerce|store|fashion|brand|consumer|beauty|apparel|marketplace/i.test(text)) return 'ecommerce';
  if(/software|cloud|api|platform|data|enterprise|developer|saas|devops|cyber|security|network|tech/i.test(text)) return 'b2btech';
  return 'generic';
}

function getThemeStyles(themeId, config) {
  const t = THEMES[themeId] || THEMES.generic;
  const o = t.overrides;
  // forceDark themes (e.g. b2btech) lock the palette; all others defer to config colors
  const forceDark = o.forceDark || false;
  return {
    brandBg:      forceDark ? o.brandBg      : (config.brandBg   || o.brandBg   || '#f9f7f4'),
    brandText:    forceDark ? o.brandText     : (config.brandText || o.brandText || '#1a1a2e'),
    // Nav: theme can hardcode a navBg (e.g. white nav for health/ecom), else use prospect primary
    navBg:        o.navBg   || config.brandPrimary || '#0f172a',
    navTextColor: o.navTextColor || config.brandHeaderText || '#ffffff',
    // Shape / structural — always from theme
    cardBg:       o.cardBg       || '#ffffff',
    cardBorder:   o.cardBorder   || '#e2e8f0',
    cardRadius:   o.cardRadius   || '14px',
    navRadius:    o.navRadius    || '8px',
    btnRadius:    o.btnRadius    || '10px',
    badgeRadius:  o.badgeRadius  || '20px',
    heroFont:     o.heroFont     || 'DM Serif Display,serif',
    headingFont:  o.headingFont  || 'DM Serif Display,serif',
    categoryStyle:o.categoryStyle|| 'pill',
    sectionBg:    o.sectionBg    || config.brandBg || '#f0ede8',
    navShadow:    o.navShadow !== undefined ? o.navShadow : '0 2px 16px rgba(0,0,0,0.15)',
    navBorderBottom: o.navBorderBottom || 'none',
    forceDark,
  };
}

function slugify(s){return(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}


async function scrapeBrand(url, manual=false, mode='fast'){
  const clean=url?(url.startsWith('http')?url:'https://'+url):'';
  const res=await fetch('/.netlify/functions/claude-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({url:clean, manual, mode})
  });
  if(!res.ok){const e=await res.text();throw new Error('Proxy '+res.status+': '+e);}
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  return data;
}

/* ─── ROUTER (hash-based, no library) ─── */
function useRoute(){
  const [route,setRoute]=useState(()=>window.location.hash.slice(1)||'/setup');
  useEffect(()=>{
    const handler=()=>setRoute(window.location.hash.slice(1)||'/setup');
    window.addEventListener('hashchange',handler);
    return()=>window.removeEventListener('hashchange',handler);
  },[]);
  return route;
}
function navigate(path){window.location.hash=path;}

function App(){
  const CONFIG_VERSION = '2026-05-11-v5'; // bumped: curated image banks per theme
  const [config,setConfig]=useState(()=>{
    try{
      const s=localStorage.getItem('hub_config');
      if(!s) return DEFAULT_CONFIG;
      const parsed=JSON.parse(s);
      // If version mismatch, wipe stale config
      if(parsed._version !== CONFIG_VERSION){ localStorage.clear(); return DEFAULT_CONFIG; }
      return{...DEFAULT_CONFIG,...parsed};
    }
    catch{return DEFAULT_CONFIG;}
  });
  const [contentfulItems,setContentfulItems]=useState([]);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [refreshing,setRefreshing]=useState(false);
  const route=useRoute();

  const updateConfig=useCallback((updates)=>{
    setConfig(prev=>{
      const next={...prev,...updates};
      localStorage.setItem('hub_config',JSON.stringify({...next,_version:CONFIG_VERSION}));
      applyBrandVars(next);
      return next;
    });
  },[]);

  useEffect(()=>{applyBrandVars(config);},[]);

  // Contentful polling — 15 min recency filter
  const pollContentful=useCallback(async(manual=false)=>{
    if(!config.generated)return;
    if(manual)setRefreshing(true);
    try{
      const res=await fetch(`https://cdn.contentful.com/spaces/${config.spaceId}/entries?access_token=${config.deliveryKey}&content_type=landingPage&order=-sys.createdAt&limit=10`);
      if(!res.ok)return;
      const data=await res.json();
      const fifteenMinsAgo=new Date(Date.now()-15*60*1000);
      const items=(data.items||[])
        .filter(item=>new Date(item.sys.createdAt)>fifteenMinsAgo)
        .map(item=>{
          const f=item.fields;
          let imageUrl=`https://picsum.photos/seed/cf-${item.sys.id}/800/450`;
          if(f.featuredImage&&data.includes){
            const asset=data.includes.Asset?.find(a=>a.sys.id===f.featuredImage.sys.id);
            if(asset?.fields?.file?.url)imageUrl='https:'+asset.fields.file.url;
          }
          return{
            id:item.sys.id,
            title:f.title||f.name||f.headline||'Untitled',
            slug:f.slug||f.pageSlug||item.sys.id,
            body:f.body||f.content||f.pageContent||f.copy||'',
            summary:(()=>{
              const raw=f.summary||f.description||f.subtitle||f.excerpt||f.metaDescription||f.body||f.content||f.pageContent||f.copy||'';
              const stripped=raw.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();
              return stripped.length>160?stripped.slice(0,157)+'…':stripped;
            })(),
            imageUrl,publishedAt:item.sys.createdAt,isNew:true,source:'contentful',
            category:f.category||f.contentType||f.type||'Latest',
            readTime:'5 min read',date:item.sys.createdAt,
          };
        });
      setContentfulItems(items);
      setLastRefresh(new Date());
    }catch(e){}
    finally{if(manual)setRefreshing(false);}
  },[config.generated,config.spaceId,config.deliveryKey]);

  useEffect(()=>{
    if(!config.generated)return;
    pollContentful();
    const iv=setInterval(()=>pollContentful(),30000);
    return()=>clearInterval(iv);
  },[config.generated,config.spaceId,config.deliveryKey]);

  // Enrich images with Unsplash after hub loads (non-blocking)
  useEffect(()=>{
    if(!config.generated)return;
    const UNSPLASH_KEY='Rtko1nJ89-XlX5QfMqnp4ovSkMD37uAo5mApAwQlGHY';
    const needsEnrichment=(items)=>items.some(a=>a.imageSource==='fallback'||!a.imageSource);
    if(!needsEnrichment(config.articles||[])&&!needsEnrichment(config.news||[]))return;
    const categoryToQuery=(category,title)=>{
      const t=((category||'')+' '+(title||'')).toLowerCase();
      if(t.includes('security')||t.includes('cyber'))return 'cybersecurity technology professional';
      if(t.includes('ai')||t.includes('artificial'))return 'artificial intelligence technology';
      if(t.includes('market'))return 'marketing team strategy meeting';
      if(t.includes('content')||t.includes('writing'))return 'content creation laptop desk';
      if(t.includes('growth')||t.includes('revenue'))return 'business growth success chart';
      if(t.includes('data')||t.includes('analytic'))return 'data analytics dashboard';
      if(t.includes('cloud')||t.includes('platform'))return 'cloud computing server technology';
      if(t.includes('health')||t.includes('medical'))return 'healthcare medical professional';
      if(t.includes('financ')||t.includes('invest'))return 'finance business professional';
      if(t.includes('product')||t.includes('launch'))return 'product launch business team';
      return 'business professional office team';
    };
    const fetchUnsplash=async(query,seed)=>{
      try{
        const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&orientation=landscape&content_filter=high&per_page=10&client_id=${UNSPLASH_KEY}`);
        if(!r.ok)return null;
        const d=await r.json();
        const results=d?.results||[];
        if(!results.length)return null;
        return results[seed%results.length]?.urls?.regular||null;
      }catch{return null;}
    };
    const enrich=async()=>{
      const articles=[...(config.articles||[])];
      const news=[...(config.news||[])];
      let changed=false;
      for(let i=0;i<articles.length;i++){
        if(articles[i].imageSource==='fallback'||!articles[i].imageSource){
          const q=categoryToQuery(articles[i].category,articles[i].title);
          const img=await fetchUnsplash(q,i);
          if(img){articles[i]={...articles[i],imageUrl:img,imageSource:'unsplash'};changed=true;}
        }
      }
      for(let i=0;i<news.length;i++){
        if(news[i].imageSource==='fallback'||!news[i].imageSource){
          const q=categoryToQuery(news[i].category,news[i].title);
          const img=await fetchUnsplash(q,i+6);
          if(img){news[i]={...news[i],imageUrl:img,imageSource:'unsplash'};changed=true;}
        }
      }
      if(changed)updateConfig({articles,news});
    };
    enrich();
  },[config.generated]);

  // Route guard
  const needsSetup=!config.generated;
  const isSetupRoute=route==='/setup'||route==='/validate';
  useEffect(()=>{
    if(needsSetup&&!isSetupRoute)navigate('/setup');
  },[needsSetup,isSetupRoute]);

  const ctx={config,updateConfig,contentfulItems,DEFAULT_CONFIG,pollContentful,refreshing,lastRefresh,THEMES,detectTheme,getThemeStyles};

  return(
    <HubCtx.Provider value={ctx}>
      {route==='/setup'&&<SetupPage/>}
      {route==='/validate'&&<ValidatePage/>}
      {config.generated&&route==='/demo'&&<DemoHub/>}
      {config.generated&&route==='/demo/articles'&&<ArticlesPage/>}
      {config.generated&&route.startsWith('/demo/articles/')&&<ArticleDetail slug={route.replace('/demo/articles/','')}/>}
      {config.generated&&route==='/demo/news'&&<NewsPage/>}
      {config.generated&&route.startsWith('/demo/news/')&&<NewsDetail slug={route.replace('/demo/news/','')}/>}
      {config.generated&&route==='/demo/products'&&<ProductsPage/>}
      {config.generated&&route==='/demo/about'&&<AboutPage/>}
    </HubCtx.Provider>
  );
}

return ONLY a valid JSON object (no markdown, no explanation) in this exact shape:
{

    ... 6 total
  ],
  "aboutText": "2 short paragraphs"
}
Company: [REPLACE WITH COMPANY NAME OR URL]`;

  const handleGptPaste=()=>{

    let parsed;

      const m=raw.match(/\{[\s\S]*\}/);

      parsed=JSON.parse(m[0]);
    }catch(e){
      setError('Could not parse JSON: '+e.message);return;
    }

    /* ── Normalise: handle both the rich agent format and the flat format ── */
    const isAgentFormat = !!(parsed.prospect || parsed.color_identity || parsed.blogs || parsed.homepage);

    let companyName, logoUrl, heroHeadline, heroSubheading,
        brandPrimary, brandAccent, brandBg, brandText, aboutText,
        rawArticles, rawNews;

    if(isAgentFormat){
      // ── Rich agent format (prospect / homepage / blogs / news / color_identity) ──
      const p   = parsed.prospect || {};
      const hp  = parsed.homepage || {};
      const ci  = parsed.color_identity || {};

      heroHeadline   = String(hero.headline || 'Insights & Resources');
      heroSubheading = String(hero.description || hero.subheadline || 'Stay ahead with the latest thinking from our team.');

      // Handle both formats:
      //   object format: { primary: { hex: '#...' } }  (Cisco-style)
      //   flat format:   { primary: '#...', dark: '#...', light: '#...' } (EGYM-style)
      const hexOf = v => typeof v==='string'&&v.startsWith('#') ? v : (v?.hex||null);
      // For nav/header: prefer 'dark' (flat) or secondary.hex (object), else primary
      brandPrimary = String(hexOf(ci.dark) || hexOf(ci.secondary) || hexOf(ci.primary) || '#0f172a');

      brandAccent  = String(hexOf(ci.primary) || hexOf(ci.accent) || '#6366f1');
      // For page bg: prefer 'light' (flat) or 'background' (object)
      brandBg      = String(hexOf(ci.light) || hexOf(ci.background) || '#ffffff');
      // For body text: prefer 'dark' derived or text color
      brandText    = String(hexOf(ci.text) || '#1c1c1c');

      // blogs → articles, news → news
      // hero_article → position 0 with full body content
      const ha = parsed.hero_article || null;
      const heroArticle = ha ? {
        title:    String(ha.title || ''),
        summary:  String(ha.description || ha.content_summary || ''),
        body:     String(ha.full_content || ha.content_summary || ha.description || ''),

        slug:     (s=>s&&!s.includes('.')?s:(b.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,50))((b.url||'').split('/').filter(Boolean).pop()),
        category: 'Insights',
        date:     b.date || '',
        url:      b.url  || '',
      }));
      // Deduplicate: if hero_article has same slug as first blog, skip that blog
      const dedupedBlogs = heroArticle
        ? blogItems.filter(b => b.slug !== heroArticle.slug)
        : blogItems;
      rawArticles = heroArticle ? [heroArticle, ...dedupedBlogs] : dedupedBlogs;
      rawNews = (parsed.news || []).map(n=>({
        title:   n.title,
        summary: n.description,
        slug:    (s=>s&&!s.includes('.')?s:(n.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,50))((n.url||'').split('/').filter(Boolean).pop()),
        category:'News',
        date:    n.date || '',
        url:     n.url  || '',
      }));
      aboutText = String(hero.description || 'A modern content hub for ' + companyName + '.');

    } else {
      // ── Flat format (original GPT prompt response) ──
      companyName    = String(parsed.companyName    || 'Content Hub');
      logoUrl        = String(parsed.logoUrl        || '');
      heroHeadline   = String(parsed.heroHeadline   || 'Insights & Resources');
      heroSubheading = String(parsed.heroSubheading || 'Stay ahead with the latest thinking from our team.');

      rawArticles    = parsed.articles || [];
      rawNews        = parsed.news     || [];
    }

    // getItemImage is a module-level util (see top of file)
    const mkItem=(a,i,t)=>({
      id:t+'-'+i,
      title:String(a.title||t+' '+(i+1)),
      summary:String(a.summary||a.description||''),
      slug:String(a.slug||(a.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||t+'-'+i),
      category:String(a.category||(t==='news'?'News':'Insights')),

      source:'gpt-paste',isNew:false,jasperDocId:null,jasperDocUrl:null,
    });

    const bp = brandPrimary;
    // hero image: use hero_article image_url if present, else default
    const heroImgUrl = (parsed.hero_article?.image_url) || '';
    const bank = CURATED_IMAGES.generic; // will be refined by theme in ValidatePage
    updateConfig({
      ...DEFAULT_CONFIG,
      companyName,logoUrl,heroHeadline,heroSubheading,
      brandPrimary:bp,brandAccent,brandBg,brandText,
      brandHeaderText:bestTextColor(bp),
      heroImageUrl: heroImgUrl || bank.hero,

      news:rawNews.slice(0,6).map((a,i)=>mkItem(a,i,'news')),

    });
    navigate('/validate');
  };

/* ─── VALIDATE PAGE ─── */
function ValidatePage(){
  const {config,updateConfig,THEMES,detectTheme}=useHub();
  const [local,setLocal]=useState({...config});
  const [tab,setTab]=useState('brand');
  const set=key=>val=>setLocal(p=>({...p,[key]:val}));

  // ── Pure hub generation — no Jasper push ──
  const handleGenerate=()=>{
    updateConfig({...local,generated:true});
    setTimeout(()=>navigate('/demo'),0);
  };

  // ── Separate Jasper push with its own state ──
  const [pushing,setPushing]=useState(false);
  const [pushStatus,setPushStatus]=useState(''); // ''|'pushing'|'done'|'error:...'
  const [pushUserId,setPushUserId]=useState(local.jasperUserId||config.jasperUserId||'');
  const [pushWebhookUrl,setPushWebhookUrl]=useState(
    local.workatoWebhookUrl||config.workatoWebhookUrl||
    'https://webhooks.workato.com/webhooks/rest/d0d61251-d9f0-4a9b-8c4e-1bea048d1afa/hubpush'
  );

  const handleJasperPush=async()=>{
    const heroArt=local.articles?.[0];
    if(!heroArt){setPushStatus('error:No hero article found');return;}
    const workatoUrl=pushWebhookUrl.trim();
    const apiKey=(local.jasperApiKey||config.jasperApiKey||'').trim();
    const userId=pushUserId.trim();
    if(!workatoUrl&&!apiKey){setPushStatus('error:Set a Workato webhook URL or Jasper API key first');return;}
    if(!userId){setPushStatus('error:User ID required (usr_XXXX format)');return;}

    setPushing(true);setPushStatus('pushing');
    try{
      const rawBody=String(heroArt.body||heroArt.summary||heroArt.title||'');
      const cleanBody=rawBody.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      let pushRes;
      if(workatoUrl){
        setPushStatus('Sending to Workato…');
        pushRes=await fetch('/.netlify/functions/claude-proxy',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            _workatoPush:true,
            workatoWebhookUrl:workatoUrl,
            companyName:local.companyName||'Content Hub',
            articleTitle:heroArt.title||'Hero Article',
            articleContent:cleanBody||heroArt.title,
            userId,
          })
        });
      } else {
        setPushStatus('Sending to Jasper API…');
        pushRes=await fetch('/.netlify/functions/claude-proxy',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            _jasperPush:true,
            action:'pushHeroArticle',
            jasperApiKey:apiKey,
            jasperUserId:userId,
            projectName:(local.companyName||'Content Hub')+' — Content Hub',
            title:heroArt.title||'Hero Article',
            content:cleanBody||heroArt.title||'Hero Article',
          })
        });
      }
      const pushData=await pushRes.json();
      if(!pushRes.ok||pushData.error){
        setPushStatus('error:'+JSON.stringify(pushData.error||pushData).slice(0,300));
        setPushing(false);return;
      }
      const jasperDocId=pushData.docId||'';
      const jasperDocUrl=pushData.appUrl||'';
      const updatedArticles=[...(local.articles||[])];
      if(updatedArticles[0]){
        updatedArticles[0]={...updatedArticles[0],jasperDocId,jasperDocUrl,isNew:!!jasperDocId,source:'jasper-doc'};
      }
      setLocal(p=>({...p,articles:updatedArticles}));
      setPushStatus('done:'+(jasperDocUrl||'pushed — check Jasper workspace'));
      setPushing(false);
    }catch(e){
      setPushStatus('exception:'+e.message);
      setPushing(false);
    }
  };

  return(
    <div style={{minHeight:'100vh',background:'#f8fafc',fontFamily:'DM Sans,sans-serif',display:'grid',gridTemplateColumns:'420px 1fr'}}>
      {/* Left */}
      <div style={{background:'white',borderRight:'1px solid #e2e8f0',display:'flex',flexDirection:'column',height:'100vh',position:'sticky',top:0}}>
        <div style={{padding:'16px 24px',borderBottom:'1px solid #e2e8f0',display:'flex',alignItems:'center',gap:16}}>
          <button onClick={()=>navigate('/setup')}
            style={{display:'flex',alignItems:'center',gap:4,background:'transparent',border:'none',color:'#64748b',fontSize:13,cursor:'pointer',padding:'4px 8px',borderRadius:6}}>

                <ColorField label="Accent / CTA" value={local.brandAccent||'#000000'} onChange={set('brandAccent')}/>

                <ColorField label="Body text" value={local.brandText||'#000000'} onChange={set('brandText')}/>

                <div style={{display:'flex',gap:6}}>

                    <span style={{fontSize:11,color:local.brandHeaderText,fontWeight:500}}>Nav text</span>
                    <span style={{fontSize:10,color:local.brandHeaderText,opacity:0.7}}>{getContrastLabel(local.brandPrimary,local.brandHeaderText)}</span>
                  </div>
                  <div style={{flex:1,background:local.brandBg,padding:'6px 10px',borderRadius:4,border:'1px solid #e2e8f0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span style={{fontSize:11,color:local.brandText,fontWeight:500}}>Body text</span>
                    <span style={{fontSize:10,color:local.brandText,opacity:0.7}}>{getContrastLabel(local.brandBg,local.brandText)}</span>
                  </div>
                  <div style={{flex:1,background:local.brandAccent,padding:'6px 10px',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span style={{fontSize:11,color:bestTextColor(local.brandAccent||'#6366f1'),fontWeight:500}}>CTA</span>
                    <span style={{fontSize:10,color:bestTextColor(local.brandAccent||'#6366f1'),opacity:0.7}}>{getContrastLabel(local.brandAccent,'#ffffff')}</span>
                  </div>
                </div>
              </div>
            </Section>
            <Section title="Identity">
              <TF label="Company name" value={local.companyName} onChange={set('companyName')}/>
              <TF label="Logo URL" value={local.logoUrl} onChange={set('logoUrl')} hint="Optional"/>

            <Section title="Hero">
              <TF label="Headline" value={local.heroHeadline} onChange={set('heroHeadline')}/>

              <TF label="Hero image URL" value={local.heroImageUrl} onChange={set('heroImageUrl')} hint="Optional"/>
              <TF label="Fallback image URL" value={local.fallbackImageUrl} onChange={set('fallbackImageUrl')} hint="Used when article has no image"/>

          {tab==='hero'&&(()=>{

            const setHero=updated=>{
              const next=[...( local.articles||[])];
              next[0]=updated;
              set('articles')(next);
            };
            return(
              <div>
                <div style={{marginBottom:16,padding:'10px 12px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:8}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#c2410c',marginBottom:2}}>⭐ Position 1 — Hero Article</div>
                  <div style={{fontSize:11,color:'#ea580c',lineHeight:1.5}}>This is the first article card on your hub. Edit it here before publishing — it will appear as the featured item in the articles grid.</div>
                </div>

                <Section title="Article content">
                  <TF label="Title" value={hero.title||''} onChange={v=>setHero({...hero,title:v})}/>
                  <TF label="Summary" value={hero.summary||''} onChange={v=>setHero({...hero,summary:v})} multiline/>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:12,fontWeight:500,color:'#374151',marginBottom:5,display:'block'}}>Category</label>
                    <select value={hero.category||'Insights'} onChange={e=>setHero({...hero,category:e.target.value})}
                      style={{width:'100%',border:'1.5px solid #e2e8f0',borderRadius:8,padding:'0 10px',fontSize:13,fontFamily:'DM Sans,sans-serif',height:36,outline:'none',color:'#0f172a',background:'white'}}>
                      {['Marketing','AI','Strategy','Growth','Content','Technology','Insights','News','Featured'].map(cat=>(
                        <option key={cat} value={cat}>{cat}</option>

                    </select>
                  </div>
                  <TF label="Read time" value={hero.readTime||'5 min read'} onChange={v=>setHero({...hero,readTime:v})}/>
                  <TF label="Date" value={hero.date||''} onChange={v=>setHero({...hero,date:v})} hint="YYYY-MM-DD"/>
                </Section>

                <Section title="Article body">
                  <div style={{fontSize:11,color:'#94a3b8',marginBottom:8,lineHeight:1.5}}>Supports markdown — use ## for headings, **bold**, *italic*, &gt; blockquotes, - lists.</div>
                  <textarea value={hero.body||''} onChange={e=>setHero({...hero,body:e.target.value})}

                    rows={10}
                    style={{width:'100%',border:'1.5px solid #e2e8f0',borderRadius:8,padding:'10px 12px',fontSize:12,
                      fontFamily:'monospace',outline:'none',color:'#0f172a',background:'white',resize:'vertical',lineHeight:1.6}}/>
                </Section>

                <Section title="Hero image">
                  {hero.imageUrl&&<div style={{marginBottom:10,borderRadius:8,overflow:'hidden',border:'1px solid #e2e8f0',height:140}}>
                    <img src={hero.imageUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={e=>e.target.style.display='none'}/>
                  </div>}
                  <TF label="Image URL" value={hero.imageUrl||''} onChange={v=>setHero({...hero,imageUrl:v,imageSource:'manual'})} hint="Optional"/>
                  <div style={{fontSize:11,color:'#94a3b8',marginTop:-4}}>Leave as-is to use the curated theme image, or paste any direct image URL.</div>
                </Section>

                <Section title="Jasper document">
                  <div style={{fontSize:11,color:'#94a3b8',marginBottom:8,lineHeight:1.5}}>If this article was created in Jasper and published to Contentful, it will automatically appear in position 1 with a "New from Jasper" badge.</div>
                  <TF label="Jasper doc URL" value={hero.jasperDocUrl||''} onChange={v=>setHero({...hero,jasperDocUrl:v})} hint="Optional"/>
                </Section>
              </div>
            );
          })()}

          {tab==='content'&&<>
            <Section title={`Articles (${local.articles?.length||0})`}>
              {(local.articles||[]).map((art,i)=>(
                <ContentItemEditor key={i} item={art} num={i+1} onChange={updated=>{
                  const next=[...local.articles];next[i]=updated;set('articles')(next);
                }}/>
              ))}
            </Section>
            <Section title={`News (${local.news?.length||0})`}>
              {(local.news||[]).map((item,i)=>(
                <ContentItemEditor key={i} item={item} num={i+1} titleOnly onChange={updated=>{
                  const next=[...local.news];next[i]=updated;set('news')(next);
                }}/>
              ))}
            </Section>
            <Section title="About">
              <TF label="About text" value={local.aboutText} onChange={set('aboutText')} multiline/>
            </Section>
          </>}


        </div>

        <div style={{padding:'16px 24px',borderTop:'1px solid #e2e8f0',display:'flex',flexDirection:'column',gap:10}}>

          {/* ── Jasper push panel ── */}
          <div style={{padding:'14px 16px',background:'#fafafa',borderRadius:12,border:'1px solid #e2e8f0'}}>
            <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Push hero article to Jasper</div>

            {/* Webhook URL */}
            <div style={{marginBottom:8}}>
              <label style={{fontSize:11,fontWeight:500,color:'#374151',marginBottom:4,display:'block'}}>Workato webhook URL</label>
              <input value={pushWebhookUrl} onChange={e=>setPushWebhookUrl(e.target.value)}
                placeholder="https://webhooks.workato.com/webhooks/rest/…/hubpush"
                style={{width:'100%',border:'1.5px solid #e2e8f0',borderRadius:7,padding:'7px 10px',fontSize:11,fontFamily:'monospace',color:'#0f172a',outline:'none',background:'white'}}/>
            </div>

            {/* User ID */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,fontWeight:500,color:'#374151',marginBottom:4,display:'block'}}>
                Jasper User ID <span style={{fontSize:10,color:'#94a3b8',fontWeight:400}}>— usr_XXXX format</span>
              </label>
              <input value={pushUserId} onChange={e=>setPushUserId(e.target.value)}
                placeholder="usr_11E2B663A25C4A40A1C470A2BCA97898"
                style={{width:'100%',border:'1.5px solid #e2e8f0',borderRadius:7,padding:'7px 10px',fontSize:11,fontFamily:'monospace',color:'#0f172a',outline:'none',background:'white'}}/>
            </div>

            {/* Status messages */}
            {pushStatus&&pushStatus.startsWith('error')&&(
              <div style={{marginBottom:8,padding:'8px 10px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:7,fontSize:11,color:'#dc2626',fontFamily:'monospace',wordBreak:'break-all',lineHeight:1.5}}>
                ⚠ {pushStatus.replace('error:','')}
              </div>
            )}
            {pushStatus&&pushStatus.startsWith('exception')&&(
              <div style={{marginBottom:8,padding:'8px 10px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:7,fontSize:11,color:'#dc2626',fontFamily:'monospace',wordBreak:'break-all'}}>
                ⚠ {pushStatus.replace('exception:','')}
              </div>
            )}
            {pushStatus&&pushStatus.startsWith('done')&&(
              <div style={{marginBottom:8,padding:'8px 10px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:7,fontSize:11,color:'#15803d',lineHeight:1.5}}>
                ✓ {pushStatus.replace('done:','')||'Pushed to Jasper workspace'}
                {pushStatus.replace('done:','').startsWith('http')&&(
                  <a href={pushStatus.replace('done:','')} target="_blank" rel="noopener noreferrer"
                    style={{display:'block',marginTop:4,color:'#0369a1',textDecoration:'underline',fontSize:10}}>
                    Open in Jasper →
                  </a>
                )}
              </div>
            )}

            {/* Push button */}
            {pushing
              ?<div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'#fff7f5',border:'1px solid #fed7c3',borderRadius:8}}>
                <div style={{width:14,height:14,border:'2px solid #fed7c3',borderTopColor:'#FF4F00',borderRadius:'50%',animation:'spin 0.7s linear infinite',flexShrink:0}}></div>
                <span style={{fontSize:12,color:'#FF4F00',fontWeight:500}}>{typeof pushStatus==='string'&&pushStatus!=='pushing'?pushStatus:'Sending to Workato…'}</span>
              </div>
              :<button onClick={handleJasperPush} disabled={pushing}
                style={{width:'100%',padding:'9px',background:'#FF4F00',color:'white',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                ✦ Push Hero Article to Jasper
              </button>
            }
          </div>

          {/* ── Generate hub button ── */}
          <button onClick={handleGenerate}
            style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'#0f172a',color:'white',border:'none',borderRadius:12,padding:14,fontSize:15,fontWeight:600,cursor:'pointer'}}
            onMouseOver={e=>e.currentTarget.style.background='#1e293b'} onMouseOut={e=>e.currentTarget.style.background='#0f172a'}>
            🚀 Generate Hub
          </button>

        </div>

      {/* Right preview */}      </div>

      {/* Right preview */}
      <div style={{padding:'32px 40px',display:'flex',flexDirection:'column',alignItems:'center',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,fontWeight:500,color:'#6366f1',marginBottom:16,alignSelf:'flex-start'}}>
          👁 Live preview
        </div>
        <MiniPreview config={local}/>
        <p style={{marginTop:14,fontSize:12,color:'#94a3b8',textAlign:'center',maxWidth:400}}>Preview updates as you edit. The final hub will include full pages and real content.</p>
      </div>
    </div>
  );
}

function Section({title,children}){
  return(
    <div style={{marginBottom:28}}>
      <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'#94a3b8',marginBottom:12}}>{title}</div>
      {children}
    </div>
  );
}
function ColorField({label,value,onChange}){
  return(
    <div>
      <label style={{fontSize:12,color:'#374151',fontWeight:500,marginBottom:5,display:'block'}}>{label}</label>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <input type="color" value={value} onChange={e=>onChange(e.target.value)}
          style={{width:34,height:34,borderRadius:8,border:'1.5px solid #e2e8f0',cursor:'pointer',padding:2}}/>
        <input type="text" value={value} maxLength={7} onChange={e=>onChange(e.target.value)}
          style={{flex:1,border:'1.5px solid #e2e8f0',borderRadius:8,padding:'0 10px',fontSize:12,fontFamily:'monospace',color:'#374151',height:34,outline:'none'}}/>
      </div>
    </div>
  );
}
function TF({label,value,onChange,multiline,hint}){
  const base={width:'100%',border:'1.5px solid #e2e8f0',borderRadius:8,padding:'8px 12px',fontSize:13,fontFamily:'DM Sans,sans-serif',color:'#0f172a',outline:'none',transition:'border-color 0.15s'};
  return(
    <div style={{marginBottom:12}}>
      <label style={{fontSize:12,fontWeight:500,color:'#374151',marginBottom:5,display:'flex',justifyContent:'space-between'}}>
        {label}{hint&&<span style={{color:'#94a3b8',fontWeight:400}}>{hint}</span>}
      </label>
      {multiline
        ?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} style={{...base,resize:'vertical',lineHeight:1.5}}/>
        :<input type="text" value={value} onChange={e=>onChange(e.target.value)} style={{...base,height:36}}/>
      }
    </div>
  );
}
function ContentItemEditor({item,num,onChange,titleOnly}){
  const [imgInput,setImgInput]=React.useState('');
  const isManual=item.imageSource==='manual';
  const srcColor={'firecrawl':'#16a34a','unsplash':'#2563eb','fallback':'#94a3b8','jasper':'#FF4F00','manual':'#7c3aed','curated':'#0369a1','picsum':'#94a3b8','gpt-paste':'#94a3b8'}[item.imageSource||'fallback']||'#94a3b8';
  const srcLabel={'firecrawl':'📸 Real','unsplash':'🖼 Unsplash','fallback':'◻ Curated','jasper':'✦ Jasper','manual':'✎ Custom','curated':'◈ Curated','picsum':'◻ Curated','gpt-paste':'◻ Curated'}[item.imageSource||'fallback']||'◻ Curated';
  const applyImg=()=>{
    const url=imgInput.trim();
    if(url){onChange({...item,imageUrl:url,imageSource:'manual'});setImgInput('');}
  };
  const clearImg=()=>onChange({...item,imageUrl:'',imageSource:'fallback'});
  return(
    <div style={{marginBottom:12,padding:14,background:'#f8fafc',borderRadius:10,border:`1px solid ${isManual?'#c4b5fd':'#e2e8f0'}`}}>
      <div style={{display:'flex',gap:10,marginBottom:10}}>
        <div style={{width:22,height:22,minWidth:22,background:'#e2e8f0',color:'#64748b',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,marginTop:2}}>{num}</div>
        <div style={{flex:1}}>
          <input value={item.title} placeholder="Title" onChange={e=>onChange({...item,title:e.target.value})}
            style={{width:'100%',border:'1px solid #e2e8f0',borderRadius:6,padding:'7px 10px',fontSize:13,fontFamily:'DM Sans,sans-serif',color:'#0f172a',marginBottom:8,outline:'none',background:'white'}}/>
          {!titleOnly&&<textarea value={item.summary} placeholder="Summary" rows={3} onChange={e=>onChange({...item,summary:e.target.value})}
            style={{width:'100%',border:'1px solid #e2e8f0',borderRadius:6,padding:'7px 10px',fontSize:12,fontFamily:'DM Sans,sans-serif',color:'#64748b',outline:'none',resize:'vertical',lineHeight:1.5,background:'white',marginBottom:0}}/>}
        </div>
      </div>
      {/* Image section */}
      <div style={{marginLeft:32}}>
        {/* Preview — always show either user image or curated placeholder */}
        <div style={{marginBottom:8,borderRadius:8,overflow:'hidden',border:`1.5px solid ${isManual?'#8b5cf6':'#e2e8f0'}`,height:160,background:'#f1f5f9',position:'relative'}}>
          <img src={item.imageUrl||''} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}
            onError={e=>{e.target.style.display='none';}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.45)',padding:'5px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:10,fontWeight:600,color:isManual?'#c4b5fd':'#cbd5e1'}}>{isManual?'✎ Custom image':srcLabel}</span>
            {isManual&&<button onClick={clearImg} style={{fontSize:10,color:'#fca5a5',background:'none',border:'none',cursor:'pointer',padding:0}}>✕ remove</button>}
          </div>
        </div>
        {/* URL input + submit */}
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <label style={{fontSize:11,fontWeight:500,color:'#374151'}}>Override with custom image URL</label>
          <div style={{display:'flex',gap:6}}>
            <input type="text" value={imgInput} onChange={e=>setImgInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&applyImg()}
              placeholder="https://example.com/photo.jpg"
              style={{flex:1,border:'1.5px solid #e2e8f0',borderRadius:6,padding:'8px 10px',fontSize:12,fontFamily:'DM Sans,sans-serif',color:'#0f172a',outline:'none',background:'white',minWidth:0}}/>
            <button onClick={applyImg} disabled={!imgInput.trim()}
              style={{padding:'8px 14px',background:imgInput.trim()?'#7c3aed':'#e2e8f0',color:imgInput.trim()?'white':'#94a3b8',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:imgInput.trim()?'pointer':'not-allowed',fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap',flexShrink:0}}>
              Apply ↵
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
function MiniPreview({config:c}){
  const ts=getThemeStyles(c.theme||'generic',c);
  const cardR=ts.cardRadius;
  const btnR=ts.btnRadius;
  const badgeR=ts.badgeRadius;
  const isMonospace=ts.heroFont==='monospace';
  const navBg=ts.navBg;
  const navText=ts.navTextColor;
  return(
    <div style={{width:'100%',maxWidth:680,borderRadius:16,overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,0.12)',border:'1px solid #e2e8f0'}}>
      {/* Nav */}
      <div style={{background:navBg,padding:'12px 20px',display:'flex',alignItems:'center',gap:12,borderBottom:ts.navBorderBottom!=='none'?ts.navBorderBottom:'none',boxShadow:ts.navShadow}}>
        {c.logoUrl&&<img src={c.logoUrl} alt="" style={{height:22,objectFit:'contain',filter:navText==='#ffffff'||navText==='#fff'?'brightness(0) invert(1)':'none'}} onError={e=>e.target.style.display='none'}/>}
        <span style={{fontSize:15,fontWeight:700,color:navText,flex:1,fontFamily:isMonospace?'monospace':'DM Sans,sans-serif'}}>{c.companyName||'Content Hub'}</span>
        <div style={{display:'flex',gap:12}}>
          {['Home','Articles','News'].map(n=><span key={n} style={{fontSize:11,color:navText,opacity:0.75,fontFamily:isMonospace?'monospace':'inherit'}}>{n}</span>)}
        </div>
      </div>
      {/* Hero */}
      <div style={{background:c.heroImageUrl
        ?`linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.35)),url(${c.heroImageUrl}) center/cover`
        :`linear-gradient(135deg,${c.brandPrimary},${c.brandPrimary}cc)`,
        padding:'32px 24px 28px'}}>
        <div style={{fontFamily:ts.heroFont,fontSize:22,color:'white',marginBottom:6,letterSpacing:isMonospace?'-0.03em':'-0.02em',textShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>{c.heroHeadline||'Insights & Resources'}</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.82)',marginBottom:16,fontFamily:isMonospace?'monospace':'DM Sans,sans-serif'}}>{c.heroSubheading||'Stay ahead with the latest thinking.'}</div>
        <div style={{background:c.brandAccent,display:'inline-block',padding:'7px 18px',borderRadius:btnR,fontSize:13,fontWeight:600,color:'white',fontFamily:isMonospace?'monospace':'inherit'}}>
          {isMonospace?'EXPLORE →':'Explore →'}
        </div>
      </div>
      {/* Cards */}
      <div style={{padding:'16px 20px',background:ts.brandBg}}>
        <div style={{fontSize:13,fontWeight:600,color:ts.brandText,marginBottom:10,fontFamily:ts.headingFont}}>{isMonospace?'// LATEST ARTICLES':'Latest Articles'}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>

/* ─── CONTENT CARD ─── */
function ContentCard({item,basePath,featured=false,size='normal',index=0}){
  const {config}=useHub();
  // Recompute via picsum if stored image is a stale hardcoded Unsplash fallback
  // Trust stored imageUrl only if it came from a real scrape or Unsplash API.
  // Recompute everything else (old hardcoded Unsplash IDs, old picsum seeds, empty).
  // Trust: real scrapes, Unsplash API, user-supplied manual overrides, curated
  // Do NOT trust: old hardcoded picsum/unsplash seeds (source=picsum/gpt-paste/undefined)
  // Priority: user-supplied (manual) > real scrape/API > curated bank (recomputed)
  const userSupplied = item.imageSource==='manual' && item.imageUrl;
  const realSource = item.imageUrl && ['unsplash','scraped','firecrawl','jasper-doc'].includes(item.source);
  const image = userSupplied
    ? item.imageUrl
    : realSource
      ? item.imageUrl
      : getItemImage(item.slug||item.id,item.category,index,config.theme);

  return(
    <a href={`#${basePath}/${item.slug||item.id}`}
      style={{display:'flex',flexDirection:featured?'row':'column',background:getThemeStyles(config.theme||'generic',config).cardBg,borderRadius:getThemeStyles(config.theme||'generic',config).cardRadius,overflow:'hidden',
        border:item.isNew?`1.5px solid ${config.brandAccent}`:`0.5px solid ${getThemeStyles(config.theme||'generic',config).cardBorder}`,
        textDecoration:'none',color:'inherit',transition:'transform 0.2s, box-shadow 0.2s',position:'relative'}}
      onMouseOver={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,0.1)';}}
      onMouseOut={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>

      {item.isNew&&<div style={{position:'absolute',top:12,left:12,display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,zIndex:2,background:config.brandAccent,color:'white',boxShadow:'0 2px 8px rgba(0,0,0,0.15)',animation:'badgePop 0.4s cubic-bezier(0.34,1.56,0.64,1)'}}>
        ✦ New from Jasper
      </div>}

      <div style={{height:featured?'auto':200,minHeight:featured?220:undefined,width:featured?'42%':undefined,backgroundImage:`url(${image})`,backgroundSize:'cover',backgroundPosition:'center',backgroundColor:'#e2e8f0',flexShrink:0,position:'relative'}}>
      </div>

      <div style={{padding:size==='small'?'12px 14px':'18px 20px',flex:1,display:'flex',flexDirection:'column',background:getThemeStyles(config.theme||'generic',config).cardBg}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <span style={{fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20,letterSpacing:'0.03em',textTransform:'uppercase',color:config.brandAccent,background:config.brandAccent+'18'}}>{item.category||'Article'}</span>
          <span style={{fontSize:12,color:'#94a3b8'}}>{item.readTime||'5 min read'}</span>
        </div>
        <h3 style={{fontSize:featured?22:size==='small'?15:17,fontWeight:600,lineHeight:1.35,color:getThemeStyles(config.theme||'generic',config).forceDark?'#e2e8f0':'#0f172a',marginBottom:8,letterSpacing:'-0.2px'}}>{item.title}</h3>
        {(featured||size!=='small')&&<p style={{fontSize:14,color:getThemeStyles(config.theme||'generic',config).forceDark?'#94a3b8':'#64748b',lineHeight:1.6,flex:1,marginBottom:12,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{stripMd(item.summary)}</p>}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'auto'}}>
          <span style={{fontSize:12,color:getThemeStyles(config.theme||'generic',config).forceDark?'#64748b':'#94a3b8'}}>{fmtDate(item.date||item.publishedAt)}</span>
          <span style={{fontSize:13,fontWeight:600,color:config.brandAccent}}>Read more →</span>
        </div>
      </div>
    </a>
  );
}

  const baseItems=isArticle?(config.articles||[]):(config.news||[]);
  const all=[...contentfulItems,...baseItems];
  const item=all.find(a=>a.slug===slug||a.id===slug);
  const related=all.filter(a=>(a.slug||a.id)!==slug).slice(0,3);
  const basePath=isArticle?'/demo/articles':'/demo/news';

  useEffect(()=>{window.scrollTo(0,0);},[slug]);
  if(!item)return null;

  // Trust stored imageUrl only if it came from a real scrape or Unsplash API.
  // Recompute everything else (old hardcoded Unsplash IDs, old picsum seeds, empty).
  const REAL_SOURCES=['unsplash','scraped','firecrawl','jasper-doc','manual','curated'];
  const useStoredImg=item.imageUrl&&(REAL_SOURCES.includes(item.source)||item.imageSource==='manual');
  const image=useStoredImg
    ?item.imageUrl
    :getItemImage(item.slug||item.id,item.category,0,config.theme);
  const body=parseMarkdown(item.body||`<p>${item.summary}</p><h2>Key insights</h2><p>This ${type} explores the latest developments in ${item.category||'this space'}, offering practical guidance for teams looking to stay ahead.</p><p>From strategy to execution, the ideas here are grounded in real-world experience and informed by industry research and best practices.</p><blockquote><p>"The best content isn't just well-written — it's well-timed, well-placed, and well-measured."</p></blockquote><p>The path forward requires deliberate choices about which tools and platforms to prioritize. This offers a framework for making those decisions with confidence.</p>`);

  return(
    <HubLayout>
      <div style={{height:440,backgroundImage:`linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6)),url(${image})`,backgroundSize:'cover',backgroundPosition:'center',display:'flex',alignItems:'flex-end'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 32px 40px',width:'100%'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'rgba(255,255,255,0.6)',marginBottom:14}}>
            <a href="#/demo" style={{color:'rgba(255,255,255,0.7)',textDecoration:'none'}}>Home</a>›
            <a href={`#${basePath}`} style={{color:'rgba(255,255,255,0.7)',textDecoration:'none'}}>{isArticle?'Articles':'News'}</a>›
            <span style={{color:'white'}}>{item.title}</span>
          </div>
          {item.isNew&&<div style={{display:'inline-flex',alignItems:'center',gap:4,color:'white',fontSize:12,fontWeight:700,padding:'4px 12px',borderRadius:20,marginBottom:12,background:config.brandAccent}}>✦ Published via Jasper</div>}
          <h1 style={{fontFamily:'DM Serif Display,serif',fontSize:40,color:'white',lineHeight:1.15,maxWidth:760,marginBottom:16,letterSpacing:'-0.3px'}}>{item.title}</h1>
          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <span style={{fontSize:12,fontWeight:600,padding:'4px 12px',borderRadius:20,textTransform:'uppercase',letterSpacing:'0.04em',background:config.brandAccent+'30',color:'white'}}>{item.category||'Article'}</span>
            <span style={{fontSize:13,color:'rgba(255,255,255,0.75)'}}>⏱ {item.readTime||'5 min read'}</span>
            <span style={{fontSize:13,color:'rgba(255,255,255,0.75)'}}>{fmtDateLong(item.date||item.publishedAt)}</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'48px 32px',display:'grid',gridTemplateColumns:'1fr 300px',gap:48,alignItems:'start'}}>
        <article>
          <p style={{fontSize:19,lineHeight:1.7,color:getThemeStyles(config.theme||'generic',config).forceDark?'#cbd5e1':'#374151',marginBottom:32,fontWeight:400,borderLeft:`3px solid ${config.brandAccent}`,paddingLeft:20}}>{stripMd(item.summary)}</p>
          {(()=>{const ts=getThemeStyles(config.theme||'generic',config);const bodyColor=ts.forceDark?'#cbd5e1':'#374151';const h2Color=ts.forceDark?'#e2e8f0':'#0f172a';const bqBg=ts.forceDark?'#1e2d3d':'#f8fafc';return(
<div style={{fontSize:16,lineHeight:1.8,color:bodyColor}} dangerouslySetInnerHTML={{__html:body.replace(/<h2>/g,'<h2 style="font-family:DM Serif Display,serif;font-size:26px;color:'+h2Color+';margin:36px 0 14px;">').replace(/<blockquote>/g,'<blockquote style="margin:28px 0;padding:20px 24px;border-left:3px solid '+config.brandAccent+';background:'+bqBg+';border-radius:0 10px 10px 0;font-style:italic;color:'+bodyColor+';">').replace(/<p>/g,'<p style="margin-bottom:20px;">')}}/>
)})()}
        </article>
        <aside style={{position:'sticky',top:88,display:'flex',flexDirection:'column',gap:20}}>

          <div style={{background:getThemeStyles(config.theme||'generic',config).forceDark?'#0a0f1a':'white',border:`1px solid ${getThemeStyles(config.theme||'generic',config).cardBorder}`,borderRadius:14,padding:'20px 22px'}}>
            <div style={{fontSize:14,fontWeight:600,color:getThemeStyles(config.theme||'generic',config).forceDark?'#e2e8f0':'#0f172a',marginBottom:10}}>Share</div>
            <div style={{display:'flex',gap:8}}>
              {['LinkedIn','Twitter','Email'].map(s=>(
                <button key={s} style={{flex:1,padding:8,borderRadius:8,fontSize:12,fontWeight:600,fontFamily:'DM Sans,sans-serif',background:'transparent',border:`1.5px solid ${config.brandAccent}40`,color:config.brandAccent,cursor:'pointer'}}>{s}</button>
              ))}
            </div>
          </div>
        </aside>
      </div>

      {related.length>0&&(
        <div style={{padding:'56px 0',background:`${config.brandPrimary}06`}}>
          <div style={{maxWidth:1200,margin:'0 auto',padding:'0 32px'}}>
            <h2 style={{fontFamily:'DM Serif Display,serif',fontSize:28,marginBottom:24,color:config.brandText||'#0f172a'}}>More {isArticle?'articles':'news'}</h2>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:24}}>
              {related.map((r,i)=><ContentCard key={r.id||r.slug} item={r} basePath={basePath} size="small" index={i}/>)}
            </div>
          </div>
        </div>
      )}
    </HubLayout>
  );
}
function ArticleDetail({slug}){return <DetailPage slug={slug} type="article"/>;}
function NewsDetail({slug}){return <DetailPage slug={slug} type="news"/>;}
